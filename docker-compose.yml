services:
  db:
    image: mysql:8.0
    container_name: mpuna-mysql
    environment:
      MYSQL_DATABASE: mpuna
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mpuna_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mpuna-backend
    environment:
      DATABASE_URL: mysql+pymysql://root@db:3306/mpuna
      JWT_SECRET_KEY: change-this-in-production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: mpuna-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mpuna_db_data:
